# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "440f26cddcd3be98f146880eca0c665d"
name = "madcatstockflow - 3"
application_url = "https://stockflow-embedded-production.up.railway.app"
embedded = true

[access_scopes]
scopes = "read_price_rules,write_price_rules,read_discounts,write_inventory,read_inventory,write_inventory_transfers,read_inventory_transfers,write_locations,read_locations,read_orders,read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [
  "https://stockflow-embedded-production.up.railway.app/auth/callback"
]

[build]
automatically_update_urls_on_dev = true